name: frontend-ec2-cicd

on:
  push:
    branches: ["master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend on EC2
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            set -e
            cd /home/alle_frontend
            git fetch --all
            git checkout master
            git pull origin master

            npm ci
            npm run build

            # If frontend runs via PM2:
            pm2 restart frontend --update-env || pm2 restart all --update-env
            pm2 save

            # If serving static build via nginx instead, use this and remove PM2 lines:
            # sudo systemctl reload nginx
          "